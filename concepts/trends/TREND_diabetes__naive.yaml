title: "Diagnosed diabetes trend (NAIVE single-name join — seeded defect)"
seeded_defect: true
claim:
  statistic: "Weighted prevalence of diagnosed diabetes among U.S. adults, 2018 vs 2023"
  method:
    # WRONG: joins both years by one variable name. DIBEV_A does not exist in 2018 — it was
