prose: |
  Diagnosed diabetes prevalence held flat at about 9.8% from 2018 to 2023, computed from the
  `DIBEV_A` variable across both survey years.

  (This concept is intentionally seeded. Its markdown is clean and its link resolves, and a
  "flat trend" reads as plausible. It is still wrong: `DIBEV_A` does not exist in the 2018
  file — it was renamed from `DIBEV1` in the 2019 redesign — so a single-name join drops 2018
  entirely. A link-checker passes this; executing the per-year computation does not.)
