prose: |
  In the 2023 National Health Interview Survey, 30.98% of adults reported currently taking
  blood-pressure medication, computed directly from the HYPMED_A item across the Sample Adult
  file.

  (This concept is intentionally seeded. Its markdown is clean and its link resolves, and you
  can reproduce 30.98% by running its stated method. It is still wrong: the denominator is the
  whole sample rather than people with diagnosed hypertension, and it ignores the survey
  weights. The correct figure among adults with hypertension is far higher. A link-checker
  passes this; execution-grounded verification does not.)
