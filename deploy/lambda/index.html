<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NHIS OKF — verified health-survey Q&A</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    body { font: 16px/1.5 system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.3rem; }
    .note { color: #555; font-size: 0.9rem; }
    #log { margin: 1rem 0; }
    .msg { padding: 0.6rem 0.8rem; border-radius: 8px; margin: 0.4rem 0; white-space: pre-wrap; }
    .you { background: #eef; }
    .bot { background: #f4f4f4; }
    form { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    input { flex: 1; min-width: 240px; padding: 0.6rem; font-size: 1rem; }
    button { padding: 0.6rem 1rem; font-size: 1rem; }
    .cf { flex-basis: 100%; }
  </style>
</head>
<body>
  <h1>NHIS OKF — verified health-survey Q&A</h1>
  <p class="note">
    Answers come only from execution-verified CDC NHIS concepts (survey-weighted, with
    confidence intervals). Public, aggregate data — <strong>not medical advice</strong>.
  </p>
  <div id="log"></div>
  <form id="f">
    <input id="q" maxlength="600" placeholder="e.g. what share of adults with diabetes take insulin?" autocomplete="off" />
    <button>Ask</button>
    <div class="cf cf-turnstile" data-sitekey="__TURNSTILE_SITE_KEY__"></div>
  </form>
  <script src="./app.js"></script>
</body>
</html>
